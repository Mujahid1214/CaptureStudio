<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capture Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES  (design tokens)
       All colours / spacing / radii live here so every component
       stays consistent.  Change a token → the whole UI updates.
    ============================================================ */
    :root {
      --bg:         #0c0c0f;
      --surface:    #141418;
      --surface2:   #1c1c22;
      --border:     #2a2a35;
      --accent1:    #00ffc8;   /* teal  – screenshots */
      --accent2:    #ff5c87;   /* pink  – radio */
      --text:       #e8e8f0;
      --muted:      #7070a0;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
      --radius:     12px;
      --transition: 0.2s cubic-bezier(.4,0,.2,1);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid texture on the background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .18;
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       LAYOUT SHELL
    ============================================================ */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text h1 {
      font-family: var(--mono);
      font-size: 1.3rem;
      letter-spacing: -1px;
      color: var(--text);
    }
    .logo-text p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ============================================================
       TWO-COLUMN GRID  (panels side by side on wide screens)
    ============================================================ */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 720px) { .panels { grid-template-columns: 1fr; } }

    /* ============================================================
       PANEL  (card container)
    ============================================================ */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    /* coloured accent bar along the top of each panel */
    .panel.screenshot::before { background: var(--accent1); }
    .panel.radio::before      { background: var(--accent2); }
    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .panel.screenshot .panel-title { color: var(--accent1); }
    .panel.radio      .panel-title { color: var(--accent2); }

    /* ============================================================
       FORM CONTROLS
    ============================================================ */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .82rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color var(--transition);
    }
    .field input:focus { border-color: var(--accent1); }
    .panel.radio .field input:focus { border-color: var(--accent2); }
    .field input::placeholder { color: var(--muted); }

    /* side-by-side width/height inputs */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      border-radius: 8px;
      padding: 11px 22px;
      font-family: var(--mono);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .btn-teal {
      background: var(--accent1);
      color: #000;
    }
    .btn-teal:not(:disabled):hover {
      background: #00e8b4;
      box-shadow: 0 0 20px rgba(0,255,200,.35);
    }

    .btn-pink {
      background: var(--accent2);
      color: #fff;
    }
    .btn-pink:not(:disabled):hover {
      background: #ff4076;
      box-shadow: 0 0 20px rgba(255,92,135,.35);
    }

    /* ============================================================
       STATUS / RESULT AREAS
    ============================================================ */
    .result-area {
      margin-top: 20px;
      min-height: 48px;
      display: none;          /* hidden until there's a result */
    }
    .result-area.visible { display: block; }

    /* spinner (CSS-only) */
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent1);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    .panel.radio .spinner { border-top-color: var(--accent2); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      display: inline-block;
      font-size: .82rem;
      color: var(--muted);
      margin-left: 10px;
      vertical-align: middle;
    }

    /* screenshot preview image */
    .preview-box {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .preview-box img {
      width: 100%;
      display: block;
      transition: opacity .3s;
    }

    /* action row below preview */
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-size: .78rem;
      color: var(--muted);
    }
    .action-row a {
      color: var(--accent1);
      text-decoration: none;
      font-family: var(--mono);
    }
    .action-row a:hover { text-decoration: underline; }

    /* error message */
    .error-box {
      background: rgba(255,60,60,.1);
      border: 1px solid rgba(255,60,60,.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .8rem;
      color: #ff7070;
    }

    /* success chip for radio */
    .success-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,255,200,.1);
      border: 1px solid rgba(0,255,200,.25);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--accent1);
    }
    .panel.radio .success-chip {
      background: rgba(255,92,135,.1);
      border-color: rgba(255,92,135,.25);
      color: var(--accent2);
    }

    /* audio player */
    audio {
      width: 100%;
      margin-top: 10px;
      accent-color: var(--accent2);
    }

    /* ============================================================
       HISTORY TABLE
    ============================================================ */
    .history-section {
      margin-top: 40px;
    }
    .history-section h2 {
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .history-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .8rem;
      font-family: var(--mono);
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all var(--transition);
    }
    .tab.active { border-color: var(--accent1); color: var(--accent1); }
    .tab.radio-tab.active { border-color: var(--accent2); color: var(--accent2); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .8rem;
    }
    .history-item .name {
      font-family: var(--mono);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55%;
    }
    .history-item .meta { color: var(--muted); font-size: .74rem; }
    .history-item a {
      color: var(--accent1);
      text-decoration: none;
      font-family: var(--mono);
      font-size: .74rem;
    }
    .history-item a:hover { text-decoration: underline; }

    .empty-msg {
      color: var(--muted);
      font-size: .82rem;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>

<body>
<div class="shell">

  <!-- ── HEADER ────────────────────────────────────────── -->
  <header>
    <div class="logo-icon">📸</div>
    <div class="logo-text">
      <h1>Capture Studio</h1>
      <p>Screenshot & Radio Recorder — powered by Flask + Playwright</p>
    </div>
  </header>

  <!-- ── TWO PANELS ────────────────────────────────────── -->
  <div class="panels">

    <!-- ── SCREENSHOT PANEL ──────────────────────────── -->
    <div class="panel screenshot">
      <div class="panel-title">🖥 Web Screenshot</div>

      <div class="field">
        <label>Page URL</label>
        <input id="ss-url" type="url" placeholder="https://example.com" />
      </div>

      <div class="row2">
        <div class="field">
          <label>Width (px)</label>
          <input id="ss-w" type="number" value="1280" min="320" max="3840"/>
        </div>
        <div class="field">
          <label>Height (px)</label>
          <input id="ss-h" type="number" value="900" min="200" max="4000"/>
        </div>
      </div>

      <button class="btn btn-teal" id="ss-btn" onclick="takeScreenshot()">
        📷 Capture
      </button>

      <!-- result area – shown after capture -->
      <div class="result-area" id="ss-result">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- ── RADIO PANEL ───────────────────────────────── -->
    <div class="panel radio">
      <div class="panel-title">📻 Radio Recorder</div>

      <div class="field">
        <label>Stream URL  (.mp3 / .aac / .ogg)</label>
        <input id="radio-url" type="url" placeholder="http://stream.example.com/live.mp3"/>
      </div>

      <div class="field">
        <label>Duration (seconds, max 120)</label>
        <input id="radio-dur" type="number" value="30" min="5" max="120"/>
      </div>

      <button class="btn btn-pink" id="radio-btn" onclick="startRadio()">
        ⏺ Record
      </button>

      <div class="result-area" id="radio-result">
        <!-- populated by JS -->
      </div>
    </div>
  </div><!-- /.panels -->

  <!-- ── HISTORY SECTION ──────────────────────────────── -->
  <div class="history-section">
    <h2>Saved Files</h2>

    <div class="history-tabs">
      <button class="tab active"     id="tab-ss"    onclick="switchTab('screenshots')">Screenshots</button>
      <button class="tab radio-tab"  id="tab-radio" onclick="switchTab('recordings')">Recordings</button>
      <button class="tab"            onclick="loadHistory()" style="margin-left:auto">↻ Refresh</button>
    </div>

    <div class="history-list" id="history-list">
      <p class="empty-msg">Loading…</p>
    </div>
  </div>

</div><!-- /.shell -->

<script>
/* ============================================================
   STATE
============================================================ */
let _historyData  = { screenshots: [], recordings: [] };
let _activeTab    = 'screenshots';
let _radioJobId   = null;
let _radioPollId  = null;   // setInterval handle

/* ============================================================
   SCREENSHOT  —  take a screenshot
   ─────────────────────────────────────────────────────────
   1. Disable the button (prevent double-click)
   2. Show a spinner
   3. POST { url, width, height } to /screenshot
   4. On success → display the preview image + download link
   5. On error   → display error box
   6. Re-enable button
============================================================ */
async function takeScreenshot() {
  const url  = document.getElementById('ss-url').value.trim();
  const w    = parseInt(document.getElementById('ss-w').value) || 1280;
  const h    = parseInt(document.getElementById('ss-h').value) || 900;
  const btn  = document.getElementById('ss-btn');
  const area = document.getElementById('ss-result');

  if (!url) { alert('Please enter a URL.'); return; }

  // ── UI: loading state ──
  btn.disabled = true;
  area.className = 'result-area visible';
  area.innerHTML = `
    <span class="spinner"></span>
    <span class="status-msg">Launching headless browser…</span>`;

  try {
    const res  = await fetch('/screenshot', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ url, width: w, height: h }),
    });
    const data = await res.json();

    if (data.success) {
      // ── Show preview + metadata + download link ──
      area.innerHTML = `
        <div class="preview-box">
          <img src="${data.preview}" alt="Screenshot preview" loading="lazy"/>
        </div>
        <div class="action-row">
          <span>✅ Captured at ${data.taken_at}</span>
          <a href="/download/screenshots/${data.filename}" download>⬇ Download</a>
        </div>`;
      loadHistory();   // refresh the saved-files list
    } else {
      area.innerHTML = `<div class="error-box">❌ ${data.error}</div>`;
    }
  } catch (err) {
    area.innerHTML = `<div class="error-box">❌ Network error: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

/* ============================================================
   RADIO  —  start a recording
   ─────────────────────────────────────────────────────────
   Because recording is slow (we wait N seconds), the server
   processes it in a background thread and returns a job_id
   immediately.  We then poll GET /radio_status/<job_id>
   every second until status == 'done' or 'error'.
============================================================ */
async function startRadio() {
  const url      = document.getElementById('radio-url').value.trim();
  const duration = parseInt(document.getElementById('radio-dur').value) || 30;
  const btn      = document.getElementById('radio-btn');
  const area     = document.getElementById('radio-result');

  if (!url) { alert('Please enter a stream URL.'); return; }

  // Stop any previous polling
  if (_radioPollId) { clearInterval(_radioPollId); _radioPollId = null; }

  btn.disabled = true;
  area.className = 'result-area visible';
  area.innerHTML = `<span class="spinner"></span>
    <span class="status-msg">Connecting to stream…</span>`;

  try {
    const res  = await fetch('/radio', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ url, duration }),
    });
    const data = await res.json();

    if (!data.success) {
      area.innerHTML = `<div class="error-box">❌ ${data.error}</div>`;
      btn.disabled = false;
      return;
    }

    _radioJobId = data.job_id;

    // ── Poll every 1.5s ──
    let elapsed = 0;
    _radioPollId = setInterval(async () => {
      elapsed += 1.5;
      const pct = Math.min(100, Math.round((elapsed / duration) * 100));

      // Update progress bar text while recording
      area.innerHTML = `<span class="spinner"></span>
        <span class="status-msg">Recording… ${pct}% (${Math.round(elapsed)}s / ${duration}s)</span>`;

      const sr   = await fetch(`/radio_status/${_radioJobId}`);
      const sdata = await sr.json();

      if (sdata.status === 'done') {
        clearInterval(_radioPollId);
        btn.disabled = false;
        // Show result with an HTML5 audio player
        area.innerHTML = `
          <div class="success-chip">🎵 ${sdata.filename} — ${sdata.size_kb} KB</div>
          <audio controls src="${sdata.path}"></audio>
          <div class="action-row">
            <span>✅ Recorded at ${sdata.recorded_at}</span>
            <a href="/download/recordings/${sdata.filename}" download>⬇ Download</a>
          </div>`;
        loadHistory();
      } else if (sdata.status === 'error') {
        clearInterval(_radioPollId);
        btn.disabled = false;
        area.innerHTML = `<div class="error-box">❌ ${sdata.error}</div>`;
      }
    }, 1500);

  } catch (err) {
    area.innerHTML = `<div class="error-box">❌ ${err.message}</div>`;
    btn.disabled = false;
  }
}

/* ============================================================
   HISTORY  —  load and render the saved files list
   Calls GET /files → JSON with { screenshots: [], recordings: [] }
============================================================ */
async function loadHistory() {
  try {
    const res  = await fetch('/files');
    const data = await res.json();
    _historyData = data;
    renderHistory();
  } catch (e) {
    document.getElementById('history-list').innerHTML =
      '<p class="empty-msg">Could not load history.</p>';
  }
}

function switchTab(tab) {
  _activeTab = tab;
  document.getElementById('tab-ss').classList.toggle('active',    tab === 'screenshots');
  document.getElementById('tab-radio').classList.toggle('active', tab === 'recordings');
  renderHistory();
}

function renderHistory() {
  const list  = document.getElementById('history-list');
  const items = _historyData[_activeTab] || [];

  if (items.length === 0) {
    list.innerHTML = `<p class="empty-msg">No ${_activeTab} yet.</p>`;
    return;
  }

  const cat = _activeTab === 'screenshots' ? 'screenshots' : 'recordings';

  list.innerHTML = items.map(f => `
    <div class="history-item">
      <span class="name" title="${f.name}">${f.name}</span>
      <span class="meta">${f.size_kb} KB · ${f.modified}</span>
      <a href="/download/${cat}/${f.name}" download>⬇</a>
    </div>`).join('');
}

/* ============================================================
   INIT  —  load history when page first opens
============================================================ */
loadHistory();
</script>
</body>
</html>
